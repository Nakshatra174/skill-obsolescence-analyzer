<!DOCTYPE html>
<html>
<head>
    <title>Skill Obsolescence Analyzer</title>

    <!-- CSS connection -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
/* 🔥 AUTOCOMPLETE DROPDOWN STYLE */
.suggestions-box {
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    background: white;
    border: 1px solid #ccc;
    border-top: none;
    max-height: 150px;
    overflow-y: auto;
    z-index: 1000;
    border-radius: 0 0 8px 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.suggestion-item {
    padding: 10px;
    cursor: pointer;
}

.suggestion-item:hover {
    background-color: #f0f0f0;
}
</style>
</head>

<body>
   {% include 'navbar.html' %}



    <div class="container">

        <h2>Skill Obsolescence Analyzer</h2>

        <form action="/predict" method="post" class="center-form">

            <label>Enter Skill Name</label><br>
            <div style="position: relative; width: 100%;">
    
            <input type="text" id="skill" name="skill"
            autocomplete="off"
            onkeyup="getSuggestions()"
            style="width: 100%; padding: 10px;">

            <div id="suggestions" class="suggestions-box"></div>

</div>

            <button type="submit">Check Obsolescence</button>

        </form>

    </div>
<script>
function getSuggestions() {

    let input = document.getElementById("skill").value;
    let suggestionsList = document.getElementById("suggestions");

    if (input.length === 0) {
        suggestionsList.innerHTML = "";
        return;
    }

    fetch(`/autocomplete?q=${input}`)
        .then(response => response.json())
        .then(data => {
            suggestionsList.innerHTML = "";

            data.forEach(skill => {
                let div = document.createElement("div");
                div.classList.add("suggestion-item");
                div.textContent = skill;

                div.onclick = () => {
                    document.getElementById("skill").value = skill;
                    suggestionsList.innerHTML = "";
                };

                suggestionsList.appendChild(div);
            });
        });
}
</script>
</body>
</html>
